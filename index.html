<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>LUXE | Premium Curated Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { premium: { gold: '#C5A02B', dark: '#0F1115', card: '#1C1F26' } }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-chip { @apply bg-premium-gold text-white shadow-md shadow-premium-gold/30; }
        .inactive-chip { @apply bg-gray-100 dark:bg-gray-800 text-gray-500; }
        
        /* Modal Transition */
        #modal-content { transition: transform 0.3s ease-out, opacity 0.3s; }
        @media (max-width: 768px) {
            #modal.hidden #modal-content { transform: translateY(100%); }
            #modal:not(.hidden) #modal-content { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-premium-dark text-slate-900 dark:text-gray-100 font-sans">

    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-premium-dark/90 backdrop-blur-xl border-b dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-extrabold tracking-tighter text-premium-gold cursor-pointer" onclick="location.reload()">LUXE.</h1>
                
                <div class="hidden md:flex gap-5 items-center border-l pl-6 border-gray-200 dark:border-gray-700">
                    <a href="https://instagram.com" target="_blank" class="text-gray-400 hover:text-premium-gold transition-all flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
                        <i class="fab fa-instagram text-lg"></i> <span>Instagram</span>
                    </a>
                    <a href="https://tiktok.com" target="_blank" class="text-gray-400 hover:text-premium-gold transition-all flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
                        <i class="fab fa-tiktok text-lg"></i> <span>TikTok</span>
                    </a>
                    <a href="https://youtube.com" target="_blank" class="text-gray-400 hover:text-premium-gold transition-all flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
                        <i class="fab fa-youtube text-lg"></i> <span>YouTube</span>
                    </a>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex md:hidden gap-4 text-gray-400 mr-2">
                    <a href="#"><i class="fab fa-instagram text-xl"></i></a>
                    <a href="#"><i class="fab fa-tiktok text-xl"></i></a>
                </div>
                
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 dark:bg-gray-800 transition shadow-inner">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-premium-gold"></i>
                </button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 pb-3">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" onkeyup="searchProducts()" 
                    placeholder="Search premium collections..." 
                    class="w-full bg-gray-100 dark:bg-gray-800/60 border-none rounded-xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-premium-gold transition-all placeholder:text-gray-400">
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 pb-4">
            <div class="flex overflow-x-auto gap-2 no-scrollbar">
                <button onclick="filterCategory('All')" class="cat-chip active-chip whitespace-nowrap px-6 py-2 rounded-lg font-bold text-[10px] uppercase tracking-[0.15em] transition-all">All</button>
                <button onclick="filterCategory('Tech')" class="cat-chip inactive-chip whitespace-nowrap px-6 py-2 rounded-lg font-bold text-[10px] uppercase tracking-[0.15em] transition-all">Technology</button>
                <button onclick="filterCategory('Home')" class="cat-chip inactive-chip whitespace-nowrap px-6 py-2 rounded-lg font-bold text-[10px] uppercase tracking-[0.15em] transition-all">Home Decor</button>
                <button onclick="filterCategory('Lifestyle')" class="cat-chip inactive-chip whitespace-nowrap px-6 py-2 rounded-lg font-bold text-[10px] uppercase tracking-[0.15em] transition-all">Lifestyle</button>
                <button onclick="filterCategory('Fitness')" class="cat-chip inactive-chip whitespace-nowrap px-6 py-2 rounded-lg font-bold text-[10px] uppercase tracking-[0.15em] transition-all">Fitness</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pt-8 pb-24">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-8">
            </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] hidden bg-black/80 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4" onclick="handleOutsideClick(event)">
        <div id="modal-content" class="bg-white dark:bg-premium-card w-full md:max-w-4xl rounded-t-[2rem] md:rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="flex flex-col md:flex-row max-h-[90vh] overflow-y-auto">
                <div class="md:w-1/2 bg-white p-10 flex items-center justify-center relative">
                    <button onclick="closeModal()" class="absolute top-5 left-5 w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center hover:bg-premium-gold hover:text-white transition"><i class="fas fa-times"></i></button>
                    <img id="modal-img" src="" class="max-h-72 md:max-h-[450px] object-contain">
                </div>
                <div class="md:w-1/2 p-10 md:p-14 space-y-8 flex flex-col justify-center">
                    <div>
                        <span id="modal-cat" class="text-premium-gold font-bold text-[10px] tracking-[0.2em] uppercase">CATEGORY</span>
                        <h2 id="modal-title" class="text-2xl md:text-4xl font-extrabold mt-3 leading-tight tracking-tight text-slate-900 dark:text-white">Product Title</h2>
                    </div>
                    <p id="modal-desc" class="text-gray-500 dark:text-gray-400 text-sm md:text-lg leading-relaxed font-medium">Description goes here...</p>
                    
                    <div class="pt-4 space-y-4">
                        <a id="modal-buy-btn" href="#" target="_blank" class="flex items-center justify-center gap-3 w-full bg-premium-gold text-white py-5 rounded-2xl font-extrabold text-lg shadow-xl shadow-premium-gold/30 hover:bg-yellow-600 transition-all">
                            BUY ON AMAZON <i class="fas fa-external-link-alt text-xs"></i>
                        </a>
                        <button onclick="shareProduct()" class="w-full py-2 text-gray-400 font-bold text-[10px] uppercase tracking-[0.2em] hover:text-premium-gold transition">
                            <i class="fas fa-share-nodes mr-2"></i> Share Product
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white dark:bg-premium-dark border-t dark:border-gray-800 py-16 px-6">
        <div class="max-w-7xl mx-auto flex flex-col items-center space-y-8">
            <div class="flex gap-8 text-gray-400">
                <a href="#" class="hover:text-premium-gold transition text-xl"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-premium-gold transition text-xl"><i class="fab fa-instagram"></i></a>
                <a href="#" class="hover:text-premium-gold transition text-xl"><i class="fab fa-pinterest"></i></a>
                <a href="#" class="hover:text-premium-gold transition text-xl"><i class="fab fa-tiktok"></i></a>
            </div>
            <p class="text-[10px] text-gray-400 uppercase tracking-[0.3em] font-bold text-center">
                © 2026 LUXE STUDIO | Amazon Affiliate Partner
            </p>
        </div>
    </footer>

    <script>
        // --- CONFIGURATION ---
        const AFFILIATE_ID = "YOUR_TAG_HERE"; // Insert your Amazon Tag here

        // --- PRODUCT DATABASE ---
        // To add a new product: Copy/Paste an object below.
        const products = [
            { id: 1, cat: 'Tech', name: 'Apple AirPods Max', img: 'https://m.media-amazon.com/images/I/81L7-oO3pNL._AC_SL1500_.jpg', asin: 'B08PZD76NS', desc: 'Experience the ultimate over-ear listening. High-fidelity audio, Active Noise Cancellation, and industry-leading design.' },
            { id: 2, cat: 'Tech', name: 'Logitech MX Master 3S', img: 'https://m.media-amazon.com/images/I/61ni3t1ryQL._AC_SL1500_.jpg', asin: 'B09HM94VDS', desc: 'The iconic mouse remastered. Quiet clicks and 8K DPI tracking on any surface.' },
            { id: 3, cat: 'Home', name: 'Nespresso Vertuo Next', img: 'https://m.media-amazon.com/images/I/71-0pYf2YLL._AC_SL1500_.jpg', asin: 'B084GSYV97', desc: 'Luxury coffee experience in a compact, sleek design. One-touch brewing for 5 cup sizes.' },
            { id: 4, cat: 'Lifestyle', name: 'Ray-Ban Wayfarer Reverse', img: 'https://m.media-amazon.com/images/I/51V1+YjE6KL._AC_SL1500_.jpg', asin: 'B0C79N8K6P', desc: 'A disruptive new design featuring an inverted lens for a sharp, futuristic look.' },
            { id: 5, cat: 'Fitness', name: 'Theragun Mini 2.0', img: 'https://m.media-amazon.com/images/I/61S-rO-n3KL._AC_SL1500_.jpg', asin: 'B0B88P9G7S', desc: 'The most agile massage device that goes wherever you do. Small but powerful recovery.' },
            { id: 6, cat: 'Home', name: 'Hatch Restore 2', img: 'https://m.media-amazon.com/images/I/61+9X3i-2KL._AC_SL1500_.jpg', asin: 'B0BT9S7Y3K', desc: 'Rest easier than ever. A sunrise alarm and white noise machine wrapped in premium fabric.' }
        ];

        // --- CORE LOGIC ---
        function renderProducts(items = products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => `
                <div class="group bg-white dark:bg-premium-card rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-800 shadow-sm active:scale-95 transition-all cursor-pointer" onclick="openModal(${p.id})">
                    <div class="h-48 md:h-64 bg-white p-8 relative flex items-center justify-center">
                        <img src="${p.img}" class="w-full h-full object-contain group-hover:scale-110 transition duration-700">
                    </div>
                    <div class="p-5">
                        <p class="text-[8px] text-premium-gold font-extrabold tracking-[0.2em] uppercase mb-1">${p.cat}</p>
                        <h3 class="font-bold text-xs md:text-base line-clamp-1 text-slate-800 dark:text-gray-100">${p.name}</h3>
                        <div class="mt-4 flex items-center text-[10px] font-bold text-premium-gold gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            VIEW DETAILS <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            const chips = document.querySelectorAll('.cat-chip');
            chips.forEach(c => {
                if(c.innerText.toLowerCase().includes(cat.toLowerCase())) {
                    c.className = "cat-chip active-chip whitespace-nowrap px-6 py-2 rounded-lg font-bold text-[10px] uppercase tracking-[0.15em] transition-all";
                } else {
                    c.className = "cat-chip inactive-chip whitespace-nowrap px-6 py-2 rounded-lg font-bold text-[10px] uppercase tracking-[0.15em] transition-all";
                }
            });
            const filtered = cat === 'All' ? products : products.filter(p => p.cat === cat);
            renderProducts(filtered);
        }

        function searchProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));
            renderProducts(filtered);
        }

        function openModal(id) {
            const p = products.find(prod => prod.id === id);
            const modal = document.getElementById('modal');
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-cat').innerText = p.cat;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-buy-btn').href = `https://www.amazon.com/dp/${p.asin}?tag=${AFFILIATE_ID}`;
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function handleOutsideClick(e) {
            if (e.target.id === 'modal') closeModal();
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        function shareProduct() {
            const name = document.getElementById('modal-title').innerText;
            if (navigator.share) {
                navigator.share({ title: name, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard!");
            }
        }

        // Initialize Store
        renderProducts();
    </script>
</body>
</html>
