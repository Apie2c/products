        @keyframes pulse-soft {

        @keyframes heartPop { 0% { transform: scale(1); } 40% { transform: scale(2.0); color: #ef4444; } 100% { transform: scale(1); } }

        .tooltip-container { position: relative; display: inline-flex; justify-content: center; align-items: center; }
        .tooltip-text { visibility: hidden; position: absolute; bottom: 135%; left: 50%; transform: translateX(-50%) translateY(5px); background-color: #0F1115; color: #fff; text-align: center; padding: 6px 10px; border-radius: 6px; font-size: 9px; font-weight: 800; white-space: nowrap; opacity: 0; transition: all 0.2s ease; z-index: 100; pointer-events: none; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); }
        .dark .tooltip-text { background-color: #2563EB; }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(120px); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 999; }
        #toast.active { transform: translateX(-50%) translateY(0); }
        
        .fade-in { opacity: 0; animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .img-aspect { aspect-ratio: 1 / 1; overflow: hidden; background: white; }


        /* Real 3D Amazon Button Effect */
        .btn-3d-amazon {
            position: relative;
            background: #FF9900;
            /* The shadow below creates the 3D depth */
            box-shadow: 0 6px 0 0 #cc7a00, 0 8px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.1s ease;
            display: flex;
            align-items: center;

        /* Updated pulse for 3D button */

    <script>
    const AFFILIATE_ID = "gitafstore-20";
    let LUXE_VAULT = {};
    let productCatalog = [];
    let wishlist = JSON.parse(localStorage.getItem('luxe_wishlist')) || [];
    let currentFilter = 'All';
    let activeProductId = null;
    let searchTimeout;

    // ── Deep-link helpers ──────────────────────────────────────────
    // Returns the product id from the current URL hash, or null.
    function getProductIdFromHash() {
        const match = window.location.hash.match(/^#product-(\d+)$/);
        return match ? parseInt(match[1], 10) : null;
    }

    // Build a full shareable URL for a product id.
    function buildProductURL(id) {
        const url = new URL(window.location.href);
        url.hash = `product-${id}`;
        // Strip any stale search params that don't belong
        return url.toString();
    }

    async function initializeVault() {
        const loader = document.getElementById('loader');
        const grid = document.getElementById('product-grid');
        try {
            const response = await fetch('vault.json');
            if (!response.ok) throw new Error('Failed to fetch');
            LUXE_VAULT = await response.json();
            
            productCatalog = Object.keys(LUXE_VAULT)
                .flatMap(cat => LUXE_VAULT[cat].map(p => ({ ...p, cat })))
                .reverse();

            initCategories();
            renderProducts();
            loader.classList.add('hidden');
            grid.classList.remove('opacity-0');

            // ── Auto-open product from shared link ─────────────────
            const linkedId = getProductIdFromHash();
            if (linkedId !== null) {
                // Push a clean base state FIRST so back-press can return to it.
                window.history.replaceState({ page: 'home' }, '', window.location.pathname);
                

                setTimeout(() => {
                openModal(linkedId);
                }, 100);
            }

        } catch (error) {
            loader.innerHTML = `<div class="text-center"><p class="text-gray-400 text-xs mb-4">Vault.json configuration required.</p><button onclick="location.reload()" class="bg-brand-primary text-white px-6 py-2 rounded-lg text-[10px] font-bold uppercase">Retry</button></div>`;
        }
    }

    function initCategories() {
        const desktops = document.getElementById('category-chips-desktop');
        const mobiles = document.getElementById('category-chips-mobile');
        const keys = ['All', ...Object.keys(LUXE_VAULT)];
        const html = keys.map(key => {
            const isActive = key === currentFilter ? 'active-chip' : '';
            return `<button onclick="filterCategory('${key}', this)" class="cat-chip ${isActive} bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-4 py-1.5 rounded-lg font-bold text-[9px] uppercase tracking-widest transition-all">${key}</button>`;
        }).join('');
        if (desktops) desktops.innerHTML = html;
        if (mobiles) mobiles.innerHTML = html;
    }

    function renderProducts() {
        const grid = document.getElementById('product-grid');
        const searchInput = document.getElementById('searchInput');
        const searchInputMobile = document.getElementById('searchInputMobile');
        const searchVal = (searchInput.value || searchInputMobile.value || '').toLowerCase();
        
        const displayItems = productCatalog.filter(p => {
            const matchesCat = currentFilter === 'All' || (currentFilter === 'Saved' ? wishlist.includes(p.id) : p.cat === currentFilter);
            return matchesCat && p.name.toLowerCase().includes(searchVal);
        });

        updateWishlistCount();

        if (displayItems.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-20 text-gray-400">
                    <i class="fas fa-box-open text-4xl mb-4 opacity-20"></i>
                    <p class="uppercase tracking-[0.2em] text-[10px] font-bold">No products found matching your search</p>
                    <button onclick="clearSearch()" class="mt-4 text-brand-primary text-[9px] font-bold uppercase tracking-widest hover:underline">Clear Filters</button>
                </div>`;
            return;
        }

        grid.innerHTML = displayItems.map((p, index) => {
            const isSaved = wishlist.includes(p.id);
            const isNew = productCatalog.slice(0, 4).some(newItem => newItem.id === p.id);
            const newBadge = isNew ? `<span class="bg-brand-primary animate-pulse-blue text-[7px] text-white px-2 py-0.5 rounded-full mr-2">NEW</span>` : '';

            return `        
            <div class="product-card fade-in bg-white dark:bg-brand-card rounded-3xl cursor-pointer relative" style="animation-delay: ${index * 50}ms" onclick="openModal(${p.id})">
                <div class="absolute top-4 right-4 z-[40]">
                    <div class="tooltip-container">
                         <button id="heart-${p.id}" onclick="event.stopPropagation(); toggleWishlist(${p.id})" class="w-8 h-8 flex items-center justify-center transition-colors ${isSaved ? 'text-red-500' : 'text-gray-300'}">
                            <i class="fas fa-heart text-sm"></i>
                         </button>
                         <span class="tooltip-text">${isSaved ? 'Remove' : 'Favorite'}</span>
                    </div>
                </div>
                <div class="rounded-3xl overflow-hidden">
                    <div class="img-aspect p-8 flex items-center justify-center">
                        <img src="${p.img}" loading="lazy" class="w-full h-full object-contain blend-img">
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-1">
                            <div class="flex items-center">
                                ${newBadge}
                                <p class="text-[7px] text-brand-primary font-extrabold uppercase tracking-widest">${p.cat}</p>
                            </div>
                            <span class="text-[7px] font-bold text-green-500 uppercase">${p.status}</span>
                        </div>
                        <h3 class="font-bold text-xs truncate dark:text-gray-100">${p.name}</h3>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchInputMobile').value = '';
        currentFilter = 'All';
        initCategories();
        renderProducts();
    }

    function toggleWishlist(id) {
        const idx = wishlist.indexOf(id);
        let isAdding = false;
        if (idx > -1) { wishlist.splice(idx, 1); showToast("Removed from favorites"); }
        else { wishlist.push(id); showToast("Added to favorites"); isAdding = true; }
        localStorage.setItem('luxe_wishlist', JSON.stringify(wishlist));
        updateWishlistCount();
        const targetIds = [`heart-${id}`, 'modal-wishlist-btn', 'header-wishlist-btn'];
        targetIds.forEach(elementId => {
            const el = document.getElementById(elementId);
            if (el) { el.classList.remove('heart-bounce'); void el.offsetWidth; if (isAdding) el.classList.add('heart-bounce'); }
        });
        renderProducts();
        if (activeProductId === id) updateWishlistUI(id);
    }

    function updateWishlistCount() {
        const el = document.getElementById('wishlist-count');
        const hBtn = document.getElementById('header-wishlist-btn');
        
        if (el) {
            el.innerText = wishlist.length;
            el.style.display = wishlist.length > 0 ? 'flex' : 'none';
        }
        
        if (hBtn) {
            if (wishlist.length > 0) {
                hBtn.classList.remove('opacity-20', 'pointer-events-none', 'cursor-not-allowed', 'text-gray-400');
                hBtn.classList.add('text-red-500', 'cursor-pointer');
            } else {
                hBtn.classList.remove('text-red-500', 'cursor-pointer');
                hBtn.classList.add('text-gray-400', 'opacity-20', 'pointer-events-none', 'cursor-not-allowed');
                if (currentFilter === 'Saved') {
                    currentFilter = 'All';
                    initCategories();
                }
            }
        }
    }

    function updateWishlistUI(id) {
        const btn = document.getElementById('modal-wishlist-btn');
        const tooltip = document.getElementById('modal-tooltip-label');
        const isSaved = wishlist.includes(id);
        if (btn) btn.className = `text-2xl transition-colors focus:outline-none ${isSaved ? 'text-red-500' : 'text-gray-300'}`;
        if (tooltip) tooltip.innerText = isSaved ? 'Remove' : 'Save Product';
    }

    function openModal(id) {
        const p = productCatalog.find(x => x.id === parseInt(id));
        if (!p) return;
        activeProductId = p.id;
        document.getElementById('modal-img').src = p.img;
        document.getElementById('modal-title').innerText = p.name;
        document.getElementById('modal-cat').innerText = p.cat;
        document.getElementById('modal-desc').innerText = p.desc;
        document.getElementById('modal-buy-btn').href = `https://www.amazon.com/dp/${p.asin}?tag=${AFFILIATE_ID}`;
        document.getElementById('modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        updateWishlistUI(p.id);

        // Push a history entry so the browser back button can close the modal.
        // State carries the product id so popstate knows what happened.
        window.history.pushState({ productId: p.id }, '', `#product-${p.id}`);
    }

    function closeModal(skipHistory) {
        document.getElementById('modal').classList.add('hidden');
        document.body.style.overflow = 'auto';
        activeProductId = null;

        // Only manipulate history when NOT called from the popstate handler
        // (the handler already moved history backward for us).
        if (!skipHistory && window.location.hash.includes('product-')) {
        window.history.pushState({ page: 'home' }, '', window.location.pathname);
        }
    }

    function filterCategory(cat, el) {
        currentFilter = cat;
        document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active-chip'));
        if (el && el.classList.contains('cat-chip')) el.classList.add('active-chip');
        renderProducts();
    }

    function syncSearch(val) {
        document.getElementById('searchInput').value = val;
        document.getElementById('searchInputMobile').value = val;
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => renderProducts(), 150);
    }

    // ── Share product ──────────────────────────────────────────────
    // Shares a direct link to the product. Falls back to copying the URL.
    async function shareProduct(event) {
        const btn = event.currentTarget;
        const old = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

        const productURL = buildProductURL(activeProductId);

        try {
            // Try native share sheet first (mobile / modern browsers)
            if (navigator.share) {
                const p = productCatalog.find(x => x.id === activeProductId);
                await navigator.share({
                    title: p ? p.name : 'Check this out on Nexora',
                    text: p ? p.desc : '',
                    url: productURL,
                });
                showToast('Shared!');
            } else {
                // Desktop fallback: copy link
                await navigator.clipboard.writeText(productURL);
                showToast('Link Copied!');
            }
        } catch (e) {
            // User dismissed share sheet or clipboard failed – silently ignore
            if (e.name !== 'AbortError') {
                try { await navigator.clipboard.writeText(productURL); showToast('Link Copied!'); } catch (_) {}
            }
        }

        btn.innerHTML = old;
    }


        function shareWhatsApp(event) {
            const p = productCatalog.find(x => x.id === activeProductId);
            if (!p) return;

            const productURL = buildProductURL(activeProductId);
    
            // Customize your share message here
            const message = `Check out the ${p.name} on Nexora! 🚀\n\n${p.desc}\n\nView here: ${productURL}`;
    
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/?text=${encodedMessage}`;
    
            window.open(whatsappUrl, '_blank');
        }


    function showToast(m) {
        const t = document.getElementById('toast');
        if (t) { t.innerText = m; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2000); }
    }

    function handleOutsideClick(e) { if (e.target.id === 'modal') closeModal(); }
    function toggleTheme() { document.documentElement.classList.toggle('dark'); }

    window.addEventListener('scroll', () => {
        const btn = document.getElementById('backToTop');
        if (window.scrollY > 500) {
            btn.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            btn.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
        } else {
            btn.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            btn.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
        }
    });

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    // ── Popstate: handle back/forward navigation ───────────────────
    window.addEventListener('popstate', (event) => {
        const modal = document.getElementById('modal');
        const isModalOpen = !modal.classList.contains('hidden');

        if (event.state && event.state.productId) {
            // Navigated forward to a product — open it (without re-pushing history)
            if (!isModalOpen) openModal(event.state.productId);
        } else {
            // Navigated back to home state — close modal without touching history
            if (isModalOpen) closeModal(true);
        }
    });

    window.addEventListener('DOMContentLoaded', initializeVault);
    </script>
