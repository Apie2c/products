<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    
    <title>LUXE | Premium Curated Store</title>
    <meta name="description" content="A highly curated vault of premium technology, home decor, and lifestyle essentials.">
    <meta property="og:title" content="LUXE | Premium Curated Store">
    <meta property="og:description" content="Discover hand-picked premium essentials for the modern aesthetic.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://img.icons8.com/ios-filled/100/C5A02B/diamond--v1.png">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/C5A02B/diamond--v1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { premium: { gold: '#C5A02B', dark: '#0F1115', card: '#1C1F26' } }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-chip { background-color: #C5A02B !important; color: white !important; box-shadow: 0 4px 12px -2px rgba(197, 160, 43, 0.4); }
        
        #modal { transition: opacity 0.3s ease-in-out; }
        #modal-content { transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        
        /* Entrance Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .product-card { opacity: 0; animation: fadeInUp 0.5s ease-out forwards; }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(197, 160, 43, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(197, 160, 43, 0); }
            100% { box-shadow: 0 0 0 0 rgba(197, 160, 43, 0); }
        }
        .share-pulse:hover { animation: pulse-gold 1.5s infinite; }

        @media (max-width: 768px) {
            #modal.hidden #modal-content { transform: translateY(100%); }
            #modal:not(.hidden) #modal-content { transform: translateY(0); }
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-premium-dark text-slate-900 dark:text-gray-100 font-sans transition-colors duration-300">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-premium-dark/80 backdrop-blur-2xl border-b border-gray-200 dark:border-gray-800 px-4">
        <div class="max-w-7xl mx-auto h-20 flex items-center gap-4 md:gap-8">
            <h1 class="text-2xl font-black tracking-tighter text-premium-gold cursor-pointer flex-shrink-0" onclick="location.href=window.location.pathname">
                LUXE<span class="text-slate-900 dark:text-white">.</span>
            </h1>

            <div class="relative group flex-grow max-w-md hidden sm:block">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fas fa-search text-xs text-gray-400 group-focus-within:text-premium-gold transition-colors"></i>
                </div>
                <input type="text" id="searchInput" oninput="handleSearch(this.value)" 
                    placeholder="Search the vault..." 
                    class="w-full bg-gray-100/50 dark:bg-gray-800/40 border border-transparent focus:border-premium-gold/30 rounded-full py-2 pl-10 pr-4 text-xs focus:ring-4 focus:ring-premium-gold/5 transition-all outline-none dark:text-white">
            </div>

            <div class="flex items-center gap-3 md:gap-5 ml-auto">
                <div class="flex items-center gap-3 md:gap-4 border-r pr-4 md:pr-6 border-gray-200 dark:border-gray-700">
                    <a href="#" class="text-gray-400 hover:text-slate-900 dark:hover:text-white transition-colors"><i class="fab fa-tiktok text-sm"></i></a>
                    <a href="#" class="text-gray-400 hover:text-green-500 transition-colors"><i class="fab fa-whatsapp text-lg"></i></a>
                    <a href="#" class="text-gray-400 hover:text-blue-400 transition-colors"><i class="fab fa-telegram text-lg"></i></a>
                </div>
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-full flex items-center justify-center bg-gray-100 dark:bg-gray-800/50 hover:bg-gray-200 dark:hover:bg-gray-700 transition shadow-sm">
                    <i class="fas fa-moon dark:hidden text-slate-700 text-sm"></i>
                    <i class="fas fa-sun hidden dark:block text-premium-gold text-sm"></i>
                </button>
            </div>
        </div>

        <div class="sm:hidden pb-4">
            <input type="text" id="searchInputMobile" oninput="handleSearch(this.value)" 
                placeholder="Search the vault..." 
                class="w-full bg-gray-100/50 dark:bg-gray-800/40 border border-transparent rounded-xl py-2 px-4 text-xs outline-none dark:text-white">
        </div>

        <div class="max-w-7xl mx-auto pb-4">
            <div class="flex overflow-x-auto gap-2 no-scrollbar">
                <button onclick="filterCategory('All', this)" class="cat-chip active-chip whitespace-nowrap px-4 py-1.5 rounded-lg font-bold text-[9px] uppercase tracking-[0.15em] transition-all">All</button>
                <button onclick="filterCategory('Tech', this)" class="cat-chip bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-4 py-1.5 rounded-lg font-bold text-[9px] uppercase tracking-[0.15em] transition-all">Technology</button>
                <button onclick="filterCategory('Home', this)" class="cat-chip bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-4 py-1.5 rounded-lg font-bold text-[9px] uppercase tracking-[0.15em] transition-all">Home Decor</button>
                <button onclick="filterCategory('Lifestyle', this)" class="cat-chip bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-4 py-1.5 rounded-lg font-bold text-[9px] uppercase tracking-[0.15em] transition-all">Lifestyle</button>
                <button onclick="filterCategory('Fitness', this)" class="cat-chip bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-4 py-1.5 rounded-lg font-bold text-[9px] uppercase tracking-[0.15em] transition-all">Fitness</button>
            </div>
        </div>
    </nav>

    <div class="py-6">
        <p class="text-[10px] text-gray-500 dark:text-gray-400 uppercase tracking-[0.3em] font-bold text-center px-4">
            As an Amazon Associate I earn from qualifying purchases.
        </p>
    </div>
        
    <main class="max-w-7xl mx-auto px-4 pt-4 pb-24">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-8"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4" onclick="handleOutsideClick(event)">
        <div id="modal-content" class="bg-white dark:bg-premium-card w-full md:max-w-4xl rounded-t-[2rem] md:rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="flex flex-col md:flex-row max-h-[90vh] overflow-y-auto">
                <div class="md:w-1/2 bg-white p-10 flex items-center justify-center relative min-h-[300px]">
                    <button onclick="closeModal()" class="absolute top-5 left-5 z-10 w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center hover:bg-premium-gold hover:text-white transition text-gray-900 shadow-md">
                        <i class="fas fa-times"></i>
                    </button>
                    <img id="modal-img" src="" class="max-h-64 md:max-h-[400px] object-contain">
                </div>
                <div class="md:w-1/2 p-8 md:p-12 space-y-6 flex flex-col justify-center">
                    <div>
                        <span id="modal-cat" class="text-premium-gold font-bold text-[10px] tracking-[0.2em] uppercase">CATEGORY</span>
                        <h2 id="modal-title" class="text-2xl md:text-3xl font-extrabold mt-2 leading-tight tracking-tight text-slate-900 dark:text-white">Product Title</h2>
                    </div>
                    <p id="modal-desc" class="text-gray-500 dark:text-gray-400 text-sm md:text-base leading-relaxed font-medium">Description...</p>
                    <div class="pt-4 space-y-4">
                        <a id="modal-buy-btn" href="#" target="_blank" class="flex items-center justify-center gap-3 w-full bg-premium-gold text-white py-4 rounded-xl font-extrabold text-base shadow-lg shadow-premium-gold/20 hover:bg-yellow-600 transition-all">
                            VIEW PRICE ON AMAZON <i class="fas fa-external-link-alt text-xs"></i>
                        </a>
                        <button id="shareBtn" onclick="shareProduct(event)" class="share-pulse w-full py-3 bg-gray-100 dark:bg-gray-800/50 text-gray-500 dark:text-gray-300 rounded-xl font-bold text-[10px] uppercase tracking-[0.2em] hover:bg-premium-gold/10 hover:text-premium-gold transition-all duration-300">
                            <i class="fas fa-magic mr-2"></i> Share Find
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="shareCanvas" width="1080" height="1080" style="display:none;"></canvas>

    <footer class="bg-white dark:bg-premium-dark border-t border-gray-200 dark:border-gray-800 py-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col items-center space-y-6">
            <div class="flex gap-8 text-gray-400">
                <a href="#" class="hover:text-premium-gold transition text-xl"><i class="fab fa-instagram"></i></a>
                <a href="#" class="hover:text-premium-gold transition text-xl"><i class="fab fa-tiktok"></i></a>
                <a href="#" class="hover:text-premium-gold transition text-xl"><i class="fab fa-youtube"></i></a>
            </div>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 uppercase tracking-[0.3em] font-bold text-center">
                © 2026 LUXE STUDIO | Amazon Affiliate Partner
            </p>
        </div>
    </footer>

    <script>
        const AFFILIATE_ID = "gitafstore-20";
        let activeProductId = null;
        let currentFilter = 'All';

        const productCatalog = {
            Tech: [
                { id: 101, name: 'Apple AirPods 4', asin: 'B0DGVT3T92', onSale: true, img: 'https://m.media-amazon.com/images/I/51adYj9+L3L._AC_SL1500_.jpg', desc: 'AirPods 4 have been redesigned for exceptional all-day comfort and stability.' },
                { id: 102, name: 'Logitech MX Master 3S', asin: 'B09HM94VDS', img: 'https://m.media-amazon.com/images/I/61ni3t1ryQL._AC_SL1500_.jpg', desc: 'The iconic mouse remastered with quiet clicks and 8K DPI tracking.' }
            ],
            Home: [
                { id: 201, name: 'Nespresso Vertuo Next', asin: 'B084GSYV97', onSale: true, img: 'https://m.media-amazon.com/images/I/71-0pYf2YLL._AC_SL1500_.jpg', desc: 'Luxury coffee experience in a compact, sleek design.' },
                { id: 202, name: 'Hatch Restore 2', asin: 'B0BT9S7Y3K', img: 'https://m.media-amazon.com/images/I/61+9X3i-2KL._AC_SL1500_.jpg', desc: 'A sunrise alarm and white noise machine wrapped in premium fabric.' }
            ],
            Lifestyle: [
                { id: 301, name: 'Ray-Ban Wayfarer Reverse', asin: 'B0C79N8K6P', img: 'https://m.media-amazon.com/images/I/51V1+YjE6KL._AC_SL1500_.jpg', desc: 'An inverted lens design for a sharp, futuristic look.' }
            ],
            Fitness: [
                { id: 401, name: 'Theragun Mini 2.0', asin: 'B0B88P9G7S', onSale: true, img: 'https://m.media-amazon.com/images/I/61S-rO-n3KL._AC_SL1500_.jpg', desc: 'Portable recovery that goes wherever you do.' }
            ]
        };

        const getAllProducts = () => Object.entries(productCatalog).flatMap(([cat, items]) => items.map(i => ({...i, cat})));

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const searchVal = (document.getElementById('searchInput').value || document.getElementById('searchInputMobile').value).toLowerCase();
            
            const displayItems = getAllProducts().filter(p => {
                const matchesCat = currentFilter === 'All' || p.cat === currentFilter;
                const matchesSearch = p.name.toLowerCase().includes(searchVal);
                return matchesCat && matchesSearch;
            });

            if (displayItems.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-40 uppercase tracking-widest text-xs">No treasures found</div>`;
                return;
            }

            grid.innerHTML = displayItems.map((p, index) => `
                <div class="product-card group bg-white dark:bg-premium-card rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-800 shadow-sm active:scale-95 transition-all cursor-pointer relative" 
                     style="animation-delay: ${index * 50}ms"
                     onclick="openModal(${p.id})">
                    ${p.onSale ? '<span class="absolute top-4 left-4 z-10 bg-red-500 text-white text-[8px] font-black px-2 py-1 rounded-full shadow-lg">SALE</span>' : ''}
                    <div class="h-48 md:h-64 bg-white p-8 relative flex items-center justify-center">
                        <img src="${p.img}" class="w-full h-full object-contain group-hover:scale-110 transition duration-700" loading="lazy">
                    </div>
                    <div class="p-5">
                        <p class="text-[8px] text-premium-gold font-extrabold tracking-[0.2em] uppercase mb-1">${p.cat}</p>
                        <h3 class="font-bold text-xs md:text-base line-clamp-1 text-slate-800 dark:text-gray-100">${p.name}</h3>
                        <div class="mt-4 flex items-center text-[10px] font-bold text-premium-gold gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            VIEW DETAILS <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function shareProduct(event) {
            const title = document.getElementById('modal-title').innerText;
            const imgElement = document.getElementById('modal-img');
            const shareBtn = event.currentTarget;
            const originalHTML = shareBtn.innerHTML;
            const shareUrl = `${window.location.origin}${window.location.pathname}?product=${activeProductId}`;

            shareBtn.innerHTML = '<i class="fas fa-magic fa-spin mr-2"></i> BUILDING CARD...';

            try {
                const canvas = document.getElementById('shareCanvas');
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#0F1115';
                ctx.fillRect(0, 0, 1080, 1080);

                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = imgElement.src;
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = () => reject(new Error("Image Load Failed"));
                });

                const maxSize = 700;
                let w = img.width, h = img.height;
                const ratio = Math.min(maxSize/w, maxSize/h);
                w *= ratio; h *= ratio;
                
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath(); ctx.roundRect(100, 150, 880, 700, 60); ctx.fill();
                ctx.drawImage(img, (1080 - w) / 2, (1000 - h) / 2, w, h);

                ctx.fillStyle = '#C5A02B';
                ctx.font = 'bold 40px Plus Jakarta Sans'; ctx.textAlign = 'center';
                ctx.fillText('L U X E  V A U L T', 540, 90);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 50px Plus Jakarta Sans';
                ctx.fillText(title.toUpperCase(), 540, 950);

                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
                const file = new File([blob], 'luxe-find.jpg', { type: 'image/jpeg' });

                if (navigator.share && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: title,
                        text: `Check this out on LUXE!`,
                        url: shareUrl
                    });
                } else {
                    throw new Error("Share not available");
                }
            } catch (err) {
                await navigator.clipboard.writeText(shareUrl);
                shareBtn.innerHTML = '<i class="fas fa-check mr-2"></i> LINK COPIED';
                setTimeout(() => shareBtn.innerHTML = originalHTML, 2000);
                return;
            }
            shareBtn.innerHTML = originalHTML;
        }

        function handleSearch(q) {
            document.getElementById('searchInput').value = q;
            document.getElementById('searchInputMobile').value = q;
            renderProducts();
        }

        function filterCategory(cat, el) {
            currentFilter = cat;
            document.querySelectorAll('.cat-chip').forEach(btn => btn.classList.remove('active-chip'));
            el.classList.add('active-chip');
            renderProducts();
        }

        function openModal(id) {
            const p = getAllProducts().find(prod => prod.id === id);
            if (!p) return;
            activeProductId = id;
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-cat').innerText = p.cat;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-buy-btn').href = `https://www.amazon.com/dp/${p.asin}?tag=${AFFILIATE_ID}`;
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            const newurl = window.location.origin + window.location.pathname + '?product=' + id;
            window.history.pushState({path:newurl},'',newurl);
        }

        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
            document.body.style.overflow = 'auto'; 
            const cleanUrl = window.location.origin + window.location.pathname;
            window.history.pushState({path:cleanUrl},'',cleanUrl);
        }

        function handleOutsideClick(e) { if (e.target.id === 'modal') closeModal(); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('product');
            if (productId) {
                setTimeout(() => openModal(parseInt(productId)), 500);
            }
            renderProducts();
        });
    </script>
</body>
</html>
