<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>LUXE | Premium Curated Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { premium: { gold: '#C5A02B', dark: '#0F1115', card: '#1C1F26' } }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-chip { background-color: #C5A02B !important; color: white !important; }
        .product-card { transition: all 0.4s ease; border: 1px solid transparent; }
        .product-card:hover { transform: translateY(-5px); border-color: #C5A02B; }
        
        /* Amazon Center Button Pulse */
        @keyframes amazon-pulse {
            0% { box-shadow: 0 0 0 0 rgba(197, 160, 43, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(197, 160, 43, 0); }
            100% { box-shadow: 0 0 0 0 rgba(197, 160, 43, 0); }
        }
        .pulse-center { animation: amazon-pulse 2s infinite; }
        
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(120px); transition: transform 0.4s; z-index: 999; }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>

<body class="bg-slate-50 dark:bg-premium-dark text-slate-900 dark:text-gray-100 font-sans transition-colors duration-300">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-premium-dark/80 backdrop-blur-2xl border-b border-gray-200 dark:border-gray-800 px-4">
        <div class="max-w-7xl mx-auto h-16 flex items-center justify-between">
            <h1 class="text-xl font-black tracking-tighter text-premium-gold cursor-pointer" onclick="window.location.reload()">LUXE<span class="text-slate-900 dark:text-white">.</span></h1>
            
            <div class="hidden lg:flex items-center gap-4 border-r border-gray-200 dark:border-gray-800 pr-6 mr-6">
                <a href="#" class="text-gray-400 hover:text-premium-gold"><i class="fab fa-instagram"></i></a>
                <a href="#" class="text-gray-400 hover:text-premium-gold"><i class="fab fa-tiktok"></i></a>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-full flex items-center justify-center bg-gray-100 dark:bg-gray-800/50">
                    <i class="fas fa-moon dark:hidden text-xs"></i>
                    <i class="fas fa-sun hidden dark:block text-premium-gold text-xs"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pt-8 pb-32">
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="w-10 h-10 border-4 border-gray-200 border-t-premium-gold rounded-full animate-spin"></div>
        </div>
        
        <div id="category-chips" class="flex overflow-x-auto gap-2 no-scrollbar mb-8 pb-2"></div>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-[100] lg:hidden bg-white dark:bg-premium-card border-t border-gray-200 dark:border-gray-800 pb-safe">
        <div class="flex items-center justify-between px-6 h-16 relative">
            
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center gap-1 text-premium-gold">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Home</span>
            </button>

            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center gap-1 text-gray-400">
                <i class="fas fa-search text-xl"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Search</span>
            </button>

            <div class="absolute left-1/2 -translate-x-1/2 -top-6">
                <a id="mobile-amazon-fab" href="https://amazon.com" target="_blank" class="w-16 h-16 bg-premium-gold text-white rounded-full shadow-2xl flex items-center justify-center border-4 border-slate-50 dark:border-premium-dark pulse-center transition-transform active:scale-90">
                    <i class="fab fa-amazon text-2xl"></i>
                </a>
            </div>

            <div class="w-16"></div>

            <button id="mobile-saved-btn" onclick="filterCategory('Saved', this)" class="flex flex-col items-center gap-1 text-gray-300 pointer-events-none opacity-30 transition-all">
                <i class="fas fa-heart text-xl"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Saved</span>
            </button>

            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center gap-1 text-gray-400">
                <i class="fas fa-chevron-up text-xl"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Top</span>
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[110] hidden bg-black/90 backdrop-blur-sm flex items-end md:items-center justify-center" onclick="if(event.target===this) closeModal()">
        <div class="bg-white dark:bg-premium-card w-full md:max-w-2xl rounded-t-3xl md:rounded-3xl p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400"><i class="fas fa-times text-xl"></i></button>
            <div class="flex flex-col items-center text-center">
                <img id="modal-img" src="" class="h-48 object-contain mb-6">
                <h2 id="modal-title" class="text-xl font-bold mb-2"></h2>
                <p id="modal-desc" class="text-sm text-gray-500 dark:text-gray-400 mb-6"></p>
                <a id="modal-buy-btn" href="#" target="_blank" class="w-full bg-premium-gold text-white py-4 rounded-xl font-bold uppercase tracking-widest">Buy Now on Amazon</a>
                <button id="modal-save-btn" onclick="toggleWishlist(activeId)" class="mt-4 text-gray-400 text-sm font-bold uppercase"><i class="fas fa-heart mr-2"></i> Save to Vault</button>
            </div>
        </div>
    </div>

    <div id="toast" class="bg-premium-gold text-white px-6 py-3 rounded-full shadow-xl text-xs font-bold uppercase tracking-widest">Saved to Vault</div>

    <script>
        const AFFILIATE_ID = "gitafstore-20";
        let products = [];
        let wishlist = JSON.parse(localStorage.getItem('luxe_wishlist')) || [];
        let activeId = null;

        async function init() {
            try {
                const res = await fetch('vault.json');
                const data = await res.json();
                products = Object.keys(data).flatMap(cat => data[cat].map(p => ({...p, cat})));
                renderCategories(Object.keys(data));
                renderProducts(products);
                updateWishlistStatus();
                document.getElementById('loader').classList.add('hidden');
            } catch (e) { console.error("Load error"); }
        }

        function renderCategories(cats) {
            const container = document.getElementById('category-chips');
            container.innerHTML = ['All', ...cats].map(c => `<button onclick="filterCategory('${c}', this)" class="cat-chip px-6 py-2 rounded-full bg-gray-100 dark:bg-gray-800 text-[10px] font-bold uppercase tracking-widest text-gray-500 whitespace-nowrap">${c}</button>`).join('');
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => `
                <div class="product-card bg-white dark:bg-premium-card rounded-2xl p-4 cursor-pointer" onclick="openModal(${p.id})">
                    <img src="${p.img}" class="h-32 w-full object-contain mb-4">
                    <p class="text-[8px] text-premium-gold font-bold uppercase mb-1">${p.cat}</p>
                    <h3 class="text-xs font-bold truncate">${p.name}</h3>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = products.find(x => x.id === id);
            activeId = id;
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-desc').innerText = p.desc;
            const link = `https://www.amazon.com/dp/${p.asin}?tag=${AFFILIATE_ID}`;
            document.getElementById('modal-buy-btn').href = link;
            document.getElementById('mobile-amazon-fab').href = link;
            document.getElementById('modal').classList.remove('hidden');
            
            const isSaved = wishlist.includes(id);
            document.getElementById('modal-save-btn').className = isSaved ? "mt-4 text-red-500 text-sm font-bold uppercase" : "mt-4 text-gray-400 text-sm font-bold uppercase";
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function toggleWishlist(id) {
            const idx = wishlist.indexOf(id);
            if(idx > -1) {
                wishlist.splice(idx, 1);
                showToast("Removed");
            } else {
                wishlist.push(id);
                showToast("Saved to Vault");
            }
            localStorage.setItem('luxe_wishlist', JSON.stringify(wishlist));
            updateWishlistStatus();
            openModal(id); // Refresh modal UI
        }

        function updateWishlistStatus() {
            const btn = document.getElementById('mobile-saved-btn');
            if(wishlist.length > 0) {
                btn.classList.remove('pointer-events-none', 'opacity-30', 'text-gray-300');
                btn.classList.add('text-red-500');
            } else {
                btn.classList.add('pointer-events-none', 'opacity-30', 'text-gray-300');
                btn.classList.remove('text-red-500');
            }
        }

        function filterCategory(cat, el) {
            const filtered = cat === 'All' ? products : (cat === 'Saved' ? products.filter(p => wishlist.includes(p.id)) : products.filter(p => p.cat === cat));
            renderProducts(filtered);
            document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active-chip'));
            if(el) el.classList.add('active-chip');
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2000);
        }

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        init();
    </script>
</body>
</html>
