<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>LUXE | Premium Curated Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { premium: { gold: '#C5A02B', dark: '#0F1115', card: '#1C1F26' } }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-chip { background-color: #C5A02B !important; color: white !important; box-shadow: 0 4px 12px -2px rgba(197, 160, 43, 0.4); }
        .product-card { transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease; border: 1px solid transparent; will-change: transform; }
        .product-card:hover { transform: translateY(-8px) scale(1.03); border-color: #C5A02B; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(197, 160, 43, 0.2); }
        
        @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .heart-bounce { animation: heartPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .tooltip-container { position: relative; display: inline-flex; }
        .tooltip-text {
            visibility: hidden; position: absolute; bottom: 130%; left: 50%;
            transform: translateX(-50%) translateY(10px); background-color: #C5A02B; color: #fff;
            padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800;
            white-space: nowrap; opacity: 0; transition: all 0.2s ease; z-index: 999; pointer-events: none;
        }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(120px); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; }
        #toast.active { transform: translateX(-50%) translateY(0); }
        .fade-in { opacity: 0; animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="bg-slate-50 dark:bg-premium-dark text-slate-900 dark:text-gray-100 font-sans transition-colors duration-300">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-premium-dark/80 backdrop-blur-2xl border-b border-gray-200 dark:border-gray-800 px-4">
        <div class="max-w-7xl mx-auto h-16 md:h-20 flex items-center justify-between gap-2">
            <h1 class="text-xl md:text-2xl font-black tracking-tighter text-premium-gold cursor-pointer" onclick="window.location.href=window.location.origin + window.location.pathname">
                LUXE<span class="text-slate-900 dark:text-white">.</span>
            </h1>

            <div class="flex items-center gap-4 flex-shrink-0">
                <div class="tooltip-container">
                    <button onclick="filterCategory('Saved', this)" class="text-gray-400 hover:text-red-500 transition-colors relative p-2">
                        <i class="fas fa-heart text-lg"></i>
                        <span id="wishlist-count" class="absolute top-1 right-0 bg-premium-gold text-white text-[7px] w-3.5 h-3.5 rounded-full hidden items-center justify-center font-bold">0</span>
                    </button>
                    <span class="tooltip-text">Saved Items</span>
                </div>
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-full flex items-center justify-center bg-gray-100 dark:bg-gray-800/50">
                    <i class="fas fa-moon dark:hidden text-slate-700"></i>
                    <i class="fas fa-sun hidden dark:block text-premium-gold"></i>
                </button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto pb-4 flex justify-center px-4">
            <div class="relative w-full md:max-w-md">
                <input type="text" id="searchInput" oninput="debouncedSearch(this.value)" placeholder="Search the vault..." class="w-full bg-gray-100/50 dark:bg-gray-800/40 border border-transparent focus:border-premium-gold/30 rounded-xl py-2.5 pl-10 pr-4 text-xs outline-none">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-400 text-xs"></i>
            </div>
        </div>

        <div class="max-w-7xl mx-auto pb-4 overflow-hidden">
            <div class="flex justify-start sm:justify-center overflow-x-auto gap-2 no-scrollbar px-2">
                <button onclick="filterCategory('All', this)" class="cat-chip active-chip whitespace-nowrap px-5 py-2 rounded-xl font-bold text-[9px] uppercase tracking-widest transition-all">All</button>
                <button onclick="filterCategory('Tech', this)" class="cat-chip bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-5 py-2 rounded-xl font-bold text-[9px] uppercase tracking-widest">Technology</button>
                <button onclick="filterCategory('Home', this)" class="cat-chip bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-5 py-2 rounded-xl font-bold text-[9px] uppercase tracking-widest">Home Decor</button>
                <button onclick="filterCategory('Lifestyle', this)" class="cat-chip bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-5 py-2 rounded-xl font-bold text-[9px] uppercase tracking-widest">Lifestyle</button>
                <button onclick="filterCategory('Fitness', this)" class="cat-chip bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-5 py-2 rounded-xl font-bold text-[9px] uppercase tracking-widest">Fitness</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pt-8 pb-24 min-h-screen">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-8"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4" onclick="handleOutsideClick(event)">
        <div id="modal-content" class="bg-white dark:bg-premium-card w-full md:max-w-4xl rounded-t-[2rem] md:rounded-[2rem] shadow-2xl relative overflow-hidden">
            <div class="flex flex-col md:flex-row max-h-[90vh] overflow-y-auto no-scrollbar">
                <div class="md:w-1/2 bg-white p-10 flex items-center justify-center relative min-h-[300px]">
                    <button onclick="closeModal()" class="absolute top-5 left-5 z-20 w-10 h-10 rounded-full bg-white/90 shadow-lg flex items-center justify-center hover:bg-premium-gold hover:text-white transition-all">
                        <i class="fas fa-times"></i>
                    </button>
                    <img id="modal-img" src="" class="max-h-64 md:max-h-[400px] object-contain transition-transform duration-700 hover:scale-110">
                </div>
                <div class="md:w-1/2 p-8 md:p-12 space-y-6 flex flex-col justify-center">
                    <div>
                        <span id="modal-cat" class="text-premium-gold font-bold text-[10px] tracking-[0.2em] uppercase">CATEGORY</span>
                        <h2 id="modal-title" class="text-2xl md:text-3xl font-extrabold mt-2 dark:text-white">Product Name</h2>
                    </div>
                    
                    <p id="modal-desc" class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed"></p>
                    
                    <div class="pt-4 flex items-center gap-3">
                        <a id="modal-buy-btn" href="#" target="_blank" class="flex-grow flex items-center justify-center bg-premium-gold text-white py-4 rounded-xl font-extrabold shadow-lg hover:bg-yellow-600 transition-all uppercase text-[11px] tracking-widest">View on Amazon</a>
                        <div class="tooltip-container">
                            <button onclick="shareProduct('whatsapp')" class="w-14 h-14 flex items-center justify-center bg-green-500/10 text-green-600 rounded-xl hover:bg-green-500 hover:text-white transition-all text-xl">
                                <i class="fab fa-whatsapp"></i>
                            </button>
                            <span class="tooltip-text">WhatsApp</span>
                        </div>
                        <div class="tooltip-container">
                            <button id="main-share-btn" onclick="shareProduct('native')" class="w-14 h-14 flex items-center justify-center bg-gray-100 dark:bg-gray-800/50 text-gray-500 rounded-xl hover:bg-premium-gold hover:text-white transition-all text-xl">
                                <i class="fas fa-share-alt"></i>
                            </button>
                            <span class="tooltip-text">Share Item</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="bg-premium-gold text-white px-8 py-3 rounded-2xl shadow-2xl font-extrabold text-[10px] uppercase tracking-widest">Added to favorites</div>
    <canvas id="shareCanvas" width="1080" height="1080" class="hidden"></canvas>

    <script>
        const AFFILIATE_ID = "gitafstore-20";
        let activeProductId = null;
        let currentFilter = 'All';
        let wishlist = JSON.parse(localStorage.getItem('luxe_wishlist')) || [];
        let searchTimeout;

        const productCatalog = [
            { id: 101, cat: 'Tech', name: 'Apple AirPods 4', asin: 'B0DGVT3T92', img: 'https://m.media-amazon.com/images/I/51adYj9+L3L._AC_SL1500_.jpg', desc: 'Redesigned shape for all-day comfort and improved acoustic architecture.', status: 'Price Stable' },
            { id: 102, cat: 'Tech', name: 'Logitech MX Master 3S', asin: 'B09HM94VDS', img: 'https://m.media-amazon.com/images/I/61ni3t1ryQL._AC_SL1500_.jpg', desc: 'The gold standard productivity mouse. Quiet Clicks and 8K DPI tracking.', status: 'Best Seller' },
            { id: 201, cat: 'Home', name: 'Nespresso Vertuo Next', asin: 'B084GSYV97', img: 'https://m.media-amazon.com/images/I/71-0pYf2YLL._AC_SL1500_.jpg', desc: 'Sleek, sustainable coffee machine with 5 cup size options.', status: 'Price Drop' },
            { id: 202, cat: 'Home', name: 'Philips Hue Bloom', asin: 'B08BNM6B5B', img: 'https://m.media-amazon.com/images/I/61h3mC55+WL._AC_SL1500_.jpg', desc: 'Smart lamp that casts millions of colors for mood lighting.', status: 'Trending' },
            { id: 301, cat: 'Lifestyle', name: 'Ray-Ban Reverse Wayfarer', asin: 'B0C79N8K6P', img: 'https://m.media-amazon.com/images/I/51V1+YjE6KL._AC_SL1500_.jpg', desc: 'A sharp, disruptive aesthetic with concave lenses.', status: 'Price Stable' },
            { id: 401, cat: 'Fitness', name: 'Theragun Mini 2.0', asin: 'B0BJ6N272N', img: 'https://m.media-amazon.com/images/I/51eO5R9Wk+L._AC_SL1500_.jpg', desc: 'Ultra-portable percussive therapy for muscle relief.', status: 'Lowest Price' }
        ];

        function getDeepLink(id) {
            const url = new URL(window.location.href.split('?')[0]);
            url.searchParams.set('id', id);
            return url.toString();
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const items = productCatalog.filter(p => {
                const matchesCat = currentFilter === 'All' || (currentFilter === 'Saved' ? wishlist.includes(p.id) : p.cat === currentFilter);
                return matchesCat && p.name.toLowerCase().includes(searchVal);
            });

            updateWishlistCount();

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-40"><p class="uppercase tracking-widest text-[10px] font-bold">No treasures found</p></div>`;
                return;
            }

            grid.innerHTML = items.map((p, i) => `
                <div class="product-card fade-in bg-white dark:bg-premium-card rounded-3xl cursor-pointer relative overflow-hidden" style="animation-delay: ${i*50}ms" onclick="openModal(${p.id})">
                    <button onclick="event.stopPropagation(); toggleWishlist(${p.id})" class="absolute top-4 right-4 z-20 w-8 h-8 flex items-center justify-center ${wishlist.includes(p.id) ? 'text-red-500' : 'text-gray-300'}">
                        <i class="fas fa-heart"></i>
                    </button>
                    <div class="p-8 bg-white flex items-center justify-center aspect-square">
                        <img src="${p.img}" class="max-h-full object-contain">
                    </div>
                    <div class="p-5">
                        <p class="text-[7px] text-premium-gold font-extrabold uppercase mb-1 tracking-widest">${p.cat}</p>
                        <h3 class="font-bold text-xs truncate dark:text-white">${p.name}</h3>
                    </div>
                </div>`).join('');
        }

        async function shareProduct(type) {
            const p = productCatalog.find(x => x.id === activeProductId);
            const link = getDeepLink(activeProductId);
            const shareText = `✨ LUXE FIND ✨\nCheck out the ${p.name}!\n\nView here: ${link}`;

            if (type === 'whatsapp') {
                window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank');
                return;
            }

            const btn = document.getElementById('main-share-btn');
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            try {
                if (navigator.share) {
                    // Create a visual card on canvas for sharing (if browser supports file share)
                    const canvas = document.getElementById('shareCanvas');
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    
                    // Attempt to load image for canvas
                    await new Promise((res, rej) => {
                        img.onload = res;
                        img.onerror = rej;
                        img.src = p.img;
                    });

                    // Draw Sleek Share Card
                    ctx.fillStyle = '#0F1115';
                    ctx.fillRect(0, 0, 1080, 1080);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.roundRect ? ctx.roundRect(50, 50, 980, 980, 80) : ctx.rect(50, 50, 980, 980);
                    ctx.fill();
                    
                    const scale = Math.min(700 / img.width, 700 / img.height);
                    ctx.drawImage(img, (1080 - img.width * scale) / 2, 150, img.width * scale, img.height * scale);

                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
                    const file = new File([blob], 'luxe-find.jpg', { type: 'image/jpeg' });

                    await navigator.share({
                        files: [file],
                        title: p.name,
                        text: shareText,
                        url: link
                    });
                } else {
                    throw new Error();
                }
            } catch (e) {
                // FALLBACK: Simple Link Copy
                navigator.clipboard.writeText(link);
                showToast("Product link copied!");
            }
            btn.innerHTML = originalIcon;
        }

        function openModal(id) {
            const p = productCatalog.find(x => x.id === parseInt(id));
            if (!p) return;
            activeProductId = p.id;
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-cat').innerText = p.cat;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-buy-btn').href = `https://www.amazon.com/dp/${p.asin}?tag=${AFFILIATE_ID}`;
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            const url = new URL(window.location);
            url.searchParams.set('id', p.id);
            window.history.replaceState({}, '', url);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            const url = new URL(window.location);
            url.searchParams.delete('id');
            window.history.replaceState({}, '', url);
        }

        function toggleWishlist(id) {
            const idx = wishlist.indexOf(id);
            if (idx > -1) wishlist.splice(idx, 1);
            else {
                wishlist.push(id);
                showToast("Added to favorites");
            }
            localStorage.setItem('luxe_wishlist', JSON.stringify(wishlist));
            renderProducts();
        }

        function updateWishlistCount() {
            const el = document.getElementById('wishlist-count');
            el.innerText = wishlist.length;
            el.style.display = wishlist.length > 0 ? 'flex' : 'none';
        }

        function filterCategory(cat, el) {
            currentFilter = cat;
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active-chip'));
            el.closest('.cat-chip').classList.add('active-chip');
            renderProducts();
        }

        function debouncedSearch(v) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(renderProducts, 150);
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2000);
        }

        function handleOutsideClick(e) { if (e.target.id === 'modal') closeModal(); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        window.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) openModal(id);
        });
    </script>
</body>
</html>
