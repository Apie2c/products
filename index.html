<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>LUXE | Premium Affiliate Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { premium: { gold: '#C5A02B', dark: '#0F1115', card: '#1C1F26' } }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-chip { @apply bg-premium-gold text-white shadow-md shadow-premium-gold/30; }
        .inactive-chip { @apply bg-gray-100 dark:bg-gray-800 text-gray-500; }
        
        /* Modal Animation */
        #modal-content { transition: transform 0.3s ease-out, opacity 0.3s; }
        @media (max-width: 768px) {
            #modal.hidden #modal-content { transform: translateY(100%); }
            #modal:not(.hidden) #modal-content { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-premium-dark text-slate-900 dark:text-gray-100 font-sans">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-premium-dark/80 backdrop-blur-xl border-b dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 h-14 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-extrabold tracking-tighter text-premium-gold" onclick="location.reload()">LUXE.</h1>
                <div class="hidden md:flex gap-3 text-gray-400 border-l pl-4 dark:border-gray-700">
                    <a href="#" class="hover:text-premium-gold transition"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="hover:text-premium-gold transition"><i class="fab fa-tiktok"></i></a>
                    <a href="#" class="hover:text-premium-gold transition"><i class="fab fa-x-twitter"></i></a>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 dark:bg-gray-800 transition">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-premium-gold"></i>
                </button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 pb-3 space-y-3">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" onkeyup="searchProducts()" 
                    placeholder="Search premium collections..." 
                    class="w-full bg-gray-100 dark:bg-gray-800/50 border-none rounded-xl py-2.5 pl-11 pr-4 text-sm focus:ring-2 focus:ring-premium-gold transition-all">
            </div>
            
            <div class="flex overflow-x-auto gap-2 no-scrollbar pb-1">
                <button onclick="filterCategory('All')" class="cat-chip active-chip whitespace-nowrap px-5 py-1.5 rounded-lg font-bold text-xs uppercase tracking-wider transition-all">All</button>
                <button onclick="filterCategory('Tech')" class="cat-chip inactive-chip whitespace-nowrap px-5 py-1.5 rounded-lg font-bold text-xs uppercase tracking-wider transition-all">Technology</button>
                <button onclick="filterCategory('Home')" class="cat-chip inactive-chip whitespace-nowrap px-5 py-1.5 rounded-lg font-bold text-xs uppercase tracking-wider transition-all">Home Decor</button>
                <button onclick="filterCategory('Lifestyle')" class="cat-chip inactive-chip whitespace-nowrap px-5 py-1.5 rounded-lg font-bold text-xs uppercase tracking-wider transition-all">Lifestyle</button>
                <button onclick="filterCategory('Fitness')" class="cat-chip inactive-chip whitespace-nowrap px-5 py-1.5 rounded-lg font-bold text-xs uppercase tracking-wider transition-all">Fitness</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pt-6 pb-20">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
            </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] hidden bg-black/70 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4">
        <div id="modal-content" class="bg-white dark:bg-premium-card w-full md:max-w-4xl rounded-t-[2.5rem] md:rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="flex flex-col md:flex-row max-h-[90vh] overflow-y-auto">
                <div class="md:w-1/2 bg-white p-8 flex items-center justify-center relative">
                    <button onclick="closeModal()" class="absolute top-4 left-4 w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center"><i class="fas fa-times"></i></button>
                    <img id="modal-img" src="" class="max-h-72 md:max-h-[450px] object-contain">
                </div>
                <div class="md:w-1/2 p-8 md:p-12 space-y-6">
                    <div>
                        <span id="modal-cat" class="text-premium-gold font-bold text-[10px] tracking-widest uppercase">TECH</span>
                        <h2 id="modal-title" class="text-2xl md:text-3xl font-extrabold mt-2 leading-tight">Product Title</h2>
                    </div>
                    <p id="modal-desc" class="text-gray-500 dark:text-gray-400 text-sm md:text-base leading-relaxed">Description goes here...</p>
                    
                    <div class="pt-4 space-y-3">
                        <a id="modal-buy-btn" href="#" target="_blank" class="flex items-center justify-center gap-3 w-full bg-premium-gold text-white py-4 rounded-2xl font-extrabold shadow-lg shadow-premium-gold/30 hover:scale-[1.02] active:scale-95 transition-all">
                            BUY ON AMAZON <i class="fas fa-external-link-alt text-xs"></i>
                        </a>
                        <button onclick="shareProduct()" class="w-full py-3 text-gray-400 font-bold text-xs uppercase tracking-widest hover:text-premium-gold transition">
                            <i class="fas fa-share-nodes mr-2"></i> Share Product
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white dark:bg-premium-dark border-t dark:border-gray-800 py-12 px-6">
        <div class="max-w-7xl mx-auto text-center space-y-6">
            <h1 class="text-xl font-extrabold text-premium-gold">LUXE.</h1>
            <div class="flex justify-center gap-6 text-gray-400 text-sm font-medium">
                <a href="#" class="hover:text-premium-gold transition">Privacy</a>
                <a href="#" class="hover:text-premium-gold transition">Terms</a>
                <a href="#" class="hover:text-premium-gold transition">Contact</a>
            </div>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest max-w-md mx-auto">
                As an Amazon Associate, I earn from qualifying purchases. Product prices and availability are accurate as of the date indicated and are subject to change.
            </p>
        </div>
    </footer>

    <script>
        // 1. INSERT YOUR AFFILIATE ID HERE
        const AFFILIATE_ID = "YOUR_TAG_HERE"; 

        // 2. PRODUCT DATABASE - Copy/Paste these blocks to add products
        const products = [
            { id: 1, cat: 'Tech', name: 'Apple AirPods Max', img: 'https://m.media-amazon.com/images/I/81L7-oO3pNL._AC_SL1500_.jpg', asin: 'B08PZD76NS', desc: 'The ultimate over-ear listening experience. High-fidelity audio, Active Noise Cancellation, and spatial audio.' },
            { id: 2, cat: 'Tech', name: 'Logitech MX Master 3S', img: 'https://m.media-amazon.com/images/I/61ni3t1ryQL._AC_SL1500_.jpg', asin: 'B09HM94VDS', desc: 'Precision mouse with 8K DPI tracking and quiet clicks for maximum productivity.' },
            { id: 3, cat: 'Home', name: 'Nespresso Vertuo Next', img: 'https://m.media-amazon.com/images/I/71-0pYf2YLL._AC_SL1500_.jpg', asin: 'B084GSYV97', desc: 'Brew the perfect coffee or espresso every time with this slim, sophisticated machine.' },
            { id: 4, cat: 'Lifestyle', name: 'Ray-Ban Classic Wayfarer', img: 'https://m.media-amazon.com/images/I/516L9y37D1L._AC_SL1500_.jpg', asin: 'B001GNBJQY', desc: 'The most recognizable style in the history of sunglasses. Iconic design and premium lenses.' },
            { id: 5, cat: 'Fitness', name: 'Theragun Mini 2.0', img: 'https://m.media-amazon.com/images/I/61S-rO-n3KL._AC_SL1500_.jpg', asin: 'B0B88P9G7S', desc: 'Powerful percussive therapy in a pocket-sized device for post-workout recovery.' },
            { id: 6, cat: 'Home', name: 'Hatch Restore 2', img: 'https://m.media-amazon.com/images/I/61+9X3i-2KL._AC_SL1500_.jpg', asin: 'B0BT9S7Y3K', desc: 'A sunrise alarm clock and sleep machine designed to help you wake up rested.' },
            { id: 7, cat: 'Tech', name: 'Kindle Scribe (16GB)', img: 'https://m.media-amazon.com/images/I/519Y9H7Bf8L._AC_SL1000_.jpg', asin: 'B09BS26B8B', desc: 'The first Kindle for reading and writing, with a 10.2” Paperwhite display.' },
            { id: 8, cat: 'Lifestyle', name: 'Bellroy Classic Backpack', img: 'https://m.media-amazon.com/images/I/61lS2Bv4YGL._AC_SL1200_.jpg', asin: 'B08V8MLDHM', desc: 'A minimalist backpack for urban professionals. Sustainably made and durable.' },
            { id: 9, cat: 'Fitness', name: 'Bowflex SelectTech 552', img: 'https://m.media-amazon.com/images/I/71-X8k-0LXL._AC_SL1500_.jpg', asin: 'B001ARYU58', desc: 'Adjustable dumbbells that replace 15 sets of weights. Space-saving fitness gear.' },
            { id: 10, cat: 'Tech', name: 'Samsung T7 Shield SSD', img: 'https://m.media-amazon.com/images/I/61S2Xqf0AIL._AC_SL1500_.jpg', asin: 'B09VLK9W3S', desc: 'Rugged, fast, and compact external storage for creators on the move.' }
        ];

        function renderProducts(items = products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => `
                <div class="group bg-white dark:bg-premium-card rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-800 shadow-sm active:scale-95 transition-all cursor-pointer" onclick="openModal(${p.id})">
                    <div class="h-44 md:h-56 bg-white p-6 relative overflow-hidden">
                        <img src="${p.img}" class="w-full h-full object-contain group-hover:scale-110 transition duration-500">
                        <div class="absolute bottom-2 left-2 flex gap-1 opacity-0 group-hover:opacity-100 transition">
                             <span class="bg-premium-gold text-white text-[8px] font-bold px-2 py-0.5 rounded">QUICK VIEW</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <p class="text-[8px] text-premium-gold font-bold tracking-widest uppercase mb-1">${p.cat}</p>
                        <h3 class="font-bold text-xs md:text-sm line-clamp-1 group-hover:text-premium-gold transition">${p.name}</h3>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            const chips = document.querySelectorAll('.cat-chip');
            chips.forEach(c => {
                if(c.innerText.toLowerCase().includes(cat.toLowerCase())) {
                    c.className = "cat-chip active-chip whitespace-nowrap px-5 py-1.5 rounded-lg font-bold text-xs uppercase tracking-wider transition-all";
                } else {
                    c.className = "cat-chip inactive-chip whitespace-nowrap px-5 py-1.5 rounded-lg font-bold text-xs uppercase tracking-wider transition-all";
                }
            });

            const filtered = cat === 'All' ? products : products.filter(p => p.cat === cat);
            renderProducts(filtered);
        }

        function searchProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));
            renderProducts(filtered);
        }

        function openModal(id) {
            const p = products.find(prod => prod.id === id);
            const modal = document.getElementById('modal');
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-cat').innerText = p.cat;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-buy-btn').href = `https://www.amazon.com/dp/${p.asin}?tag=${AFFILIATE_ID}`;
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        function shareProduct() {
            const name = document.getElementById('modal-title').innerText;
            if (navigator.share) {
                navigator.share({ title: name, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard!");
            }
        }

        // Close modal on outside click
        window.onclick = (e) => { if(e.target == document.getElementById('modal')) closeModal(); }

        renderProducts();
    </script>
</body>
</html>
