<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Nexora | Smart Tech. Modern Living.</title>
    
    <meta name="description" content="Curated innovation for the modern home. Discover smart tech and elevated style.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com/">
    <meta property="og:title" content="Nexora | Elevated Tech & Style">
    <meta property="og:description" content="Curated innovation for the modern home.">
    <meta property="og:image" content="https://yourdomain.com/assets/banner.jpg">
    <meta property="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: {
                            primary: '#2563EB',
                            dark: '#0B0F1A',
                            card: '#111827'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-chip { background-color: #2563EB !important; color: white !important; box-shadow: 0 4px 12px -2px rgba(37, 99, 235, 0.4); }
        .product-card { transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); border: 1px solid transparent; }
        .product-card:hover { transform: translateY(-8px) scale(1.03); border-color: #2563EB; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(37, 99, 235, 0.2); }
        .product-card img { transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .product-card:hover img { transform: scale(1.1); }
        .blend-img { mix-blend-mode: normal; filter: contrast(1.1); }
        .social-icon { transition: all 0.3s ease; }
        .hover-facebook:hover { color: #1877F2 !important; }
        .hover-instagram:hover { color: #E4405F !important; }
        .hover-whatsapp:hover { color: #25D366 !important; }
        @keyframes pulse-soft { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }
        .animate-pulse-blue { animation: pulse-soft 3s infinite; }
        @keyframes heartPop { 0% { transform: scale(1); } 40% { transform: scale(2.0); color: #ef4444; } 100% { transform: scale(1); } }
        .heart-bounce { animation: heartPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important; }
        .tooltip-container { position: relative; display: inline-flex; justify-content: center; align-items: center; }
        .tooltip-text { visibility: hidden; position: absolute; bottom: 135%; left: 50%; transform: translateX(-50%) translateY(5px); background-color: #0F1115; color: #fff; text-align: center; padding: 6px 10px; border-radius: 6px; font-size: 9px; font-weight: 800; white-space: nowrap; opacity: 0; transition: all 0.2s ease; z-index: 100; pointer-events: none; }
        .dark .tooltip-text { background-color: #2563EB; }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(120px); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 999; }
        #toast.active { transform: translateX(-50%) translateY(0); }
        .fade-in { opacity: 0; animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .img-aspect { aspect-ratio: 1 / 1; overflow: hidden; background: white; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-brand-dark text-slate-900 dark:text-gray-100 font-sans transition-colors duration-300">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-brand-dark/80 backdrop-blur-2xl border-b border-gray-200 dark:border-gray-800 px-4">
        <div class="max-w-7xl mx-auto h-16 lg:h-20 flex items-center justify-between gap-2">
            <h1 class="text-xl md:text-2xl font-black tracking-tighter text-brand-primary cursor-pointer flex-shrink-0" onclick="location.href=window.location.pathname">
                NEXORA<span class="text-blue-500">.</span>
            </h1>

            <div class="hidden lg:flex items-center flex-grow justify-between ml-8">
                <div id="category-chips-desktop" class="flex gap-2 mr-4"></div>
                <div class="flex items-center gap-6">
                    <div class="relative group w-48">
                        <input type="text" id="searchInput" oninput="syncSearch(this.value)" placeholder="Search..." class="w-full bg-gray-100/50 dark:bg-gray-800/40 border border-transparent focus:border-brand-primary/30 rounded-xl py-2 pl-9 pr-4 text-[10px] outline-none dark:text-white">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-[10px] text-gray-400"></i>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-0.5 sm:gap-2 flex-shrink-0">
                <button id="header-wishlist-btn" onclick="filterCategory('Saved', this)" class="transition-all relative p-2 text-gray-400">
                    <i class="fas fa-heart text-lg"></i>
                    <span id="wishlist-count" class="absolute top-1 right-0 bg-brand-primary text-white text-[7px] w-4 h-4 rounded-full hidden items-center justify-center font-bold border-2 border-white dark:border-gray-900">0</span>
                </button>
                <button onclick="toggleTheme()" class="w-9 h-9 flex items-center justify-center bg-transparent transition-all">
                    <i class="fas fa-moon dark:hidden text-sm text-gray-400"></i>
                    <i class="fas fa-sun hidden dark:block text-brand-primary text-sm"></i>
                </button>
            </div>
        </div>

        <div class="lg:hidden pb-4">
            <div class="px-2 pb-2">
                <div class="relative w-full">
                    <input type="text" id="searchInputMobile" oninput="syncSearch(this.value)" placeholder="Discover..." class="w-full bg-gray-100/50 dark:bg-gray-800/40 border border-transparent rounded-xl py-2.5 pl-10 pr-4 text-xs outline-none dark:text-white">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-xs text-gray-400"></i>
                </div>
            </div>
            <div id="category-chips-mobile" class="flex justify-start items-center overflow-x-auto gap-2 no-scrollbar px-4"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pt-8 pb-24 min-h-screen">
        <div id="loader" class="flex flex-col items-center justify-center py-32 space-y-4">
            <div class="w-12 h-12 border-4 border-gray-200 border-t-brand-primary rounded-full animate-spin"></div>
            <p class="text-[10px] uppercase tracking-[0.4em] text-gray-400 font-bold">Loading Nexora...</p>
        </div>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-8 opacity-0 transition-opacity duration-700"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4" onclick="handleOutsideClick(event)">
        <div id="modal-content" class="bg-white dark:bg-brand-card w-full md:max-w-4xl rounded-t-[2rem] md:rounded-[2rem] shadow-2xl relative overflow-hidden">
            <div class="modal-body-container flex flex-col md:flex-row max-h-[90vh] overflow-y-auto no-scrollbar">
                <div class="md:w-1/2 bg-white p-10 flex items-center justify-center relative min-h-[300px]">
                    <button onclick="closeModal()" class="absolute top-5 left-5 z-20 w-10 h-10 rounded-full bg-white/90 flex items-center justify-center hover:bg-brand-primary hover:text-white transition-all shadow-lg"><i class="fas fa-times"></i></button>
                    <img id="modal-img" src="" class="max-h-64 md:max-h-[400px] object-contain transition-transform duration-700 hover:scale-110 blend-img">
                </div>
                <div class="md:w-1/2 p-8 md:p-12 space-y-6 flex flex-col justify-center">
                    <div class="flex justify-between items-start">
                        <div>
                            <span id="modal-cat" class="text-brand-primary font-bold text-[10px] tracking-[0.2em] uppercase">CATEGORY</span>
                            <h2 id="modal-title" class="text-2xl md:text-3xl font-extrabold mt-2 text-slate-900 dark:text-white">Product</h2>
                        </div>
                        <button id="modal-wishlist-btn" onclick="toggleWishlist(activeProductId)" class="text-2xl text-gray-300 transition-colors focus:outline-none">
                            <i class="fas fa-heart"></i>
                        </button>
                    </div>
                    <p id="modal-desc" class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed"></p>
                    <div class="pt-4 flex items-center gap-3">
                        <a id="modal-buy-btn" href="#" target="_blank" class="flex-grow flex items-center justify-center bg-brand-primary text-white py-4 rounded-xl font-extrabold shadow-lg hover:bg-blue-700 transition-all uppercase text-[11px] tracking-widest">View on Amazon</a>
                        
                        <div class="tooltip-container">
                            <button onclick="copyProductImage(event)" class="w-14 h-14 flex items-center justify-center bg-gray-100 dark:bg-gray-800/50 text-gray-500 rounded-xl transition-all text-xl">
                                <i class="fas fa-file-image"></i>
                            </button>
                            <span class="tooltip-text">Copy Image</span>
                        </div>

                        <div class="tooltip-container">
                            <button onclick="shareProduct(event)" class="w-14 h-14 flex items-center justify-center bg-gray-100 dark:bg-gray-800/50 text-gray-500 rounded-xl transition-all text-xl">
                                <i class="fas fa-share-alt"></i>
                            </button>
                            <span class="tooltip-text">Share Link</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="bg-brand-primary text-white px-8 py-3 rounded-2xl shadow-2xl font-extrabold text-[10px] uppercase tracking-[0.2em]">Product saved</div>

    <script>
    const AFFILIATE_ID = "gitafstore-20";
    let LUXE_VAULT = {};
    let productCatalog = [];
    let wishlist = JSON.parse(localStorage.getItem('luxe_wishlist')) || [];
    let currentFilter = 'All';
    let activeProductId = null;
    let searchTimeout;

    function getProductIdFromHash() {
        const match = window.location.hash.match(/^#product-(\d+)$/);
        return match ? parseInt(match[1], 10) : null;
    }

    function buildProductURL(id) {
        const url = new URL(window.location.origin + window.location.pathname);
        url.hash = `product-${id}`;
        return url.toString();
    }

    async function initializeVault() {
        const loader = document.getElementById('loader');
        const grid = document.getElementById('product-grid');
        try {
            const response = await fetch('vault.json');
            if (!response.ok) throw new Error('Failed to fetch');
            LUXE_VAULT = await response.json();
            
            productCatalog = Object.keys(LUXE_VAULT)
                .flatMap(cat => LUXE_VAULT[cat].map(p => ({ ...p, cat })))
                .reverse();

            initCategories();
            renderProducts();
            loader.classList.add('hidden');
            grid.classList.remove('opacity-0');

            // ── FIX: History Management for Shared Links ──
            const linkedId = getProductIdFromHash();
            if (linkedId !== null) {
                // Force a 'Home' state behind the current URL so 'Back' has a destination
                window.history.replaceState({ page: 'home' }, '', window.location.pathname);
                setTimeout(() => openModal(linkedId), 100);
            }
        } catch (error) {
            loader.innerHTML = `<p class="text-gray-400 text-xs">Error loading vault.json</p>`;
        }
    }

    function initCategories() {
        const desktops = document.getElementById('category-chips-desktop');
        const mobiles = document.getElementById('category-chips-mobile');
        const keys = ['All', ...Object.keys(LUXE_VAULT)];
        const html = keys.map(key => {
            const isActive = key === currentFilter ? 'active-chip' : '';
            return `<button onclick="filterCategory('${key}', this)" class="cat-chip ${isActive} bg-gray-100 dark:bg-gray-800/50 text-gray-500 whitespace-nowrap px-4 py-1.5 rounded-lg font-bold text-[9px] uppercase tracking-widest transition-all">${key}</button>`;
        }).join('');
        if (desktops) desktops.innerHTML = html;
        if (mobiles) mobiles.innerHTML = html;
    }

    function renderProducts() {
        const grid = document.getElementById('product-grid');
        const searchVal = (document.getElementById('searchInput').value || '').toLowerCase();
        
        const displayItems = productCatalog.filter(p => {
            const matchesCat = currentFilter === 'All' || (currentFilter === 'Saved' ? wishlist.includes(p.id) : p.cat === currentFilter);
            return matchesCat && p.name.toLowerCase().includes(searchVal);
        });

        updateWishlistCount();

        grid.innerHTML = displayItems.map((p, index) => {
            const isSaved = wishlist.includes(p.id);
            return `        
            <div class="product-card fade-in bg-white dark:bg-brand-card rounded-3xl cursor-pointer relative" style="animation-delay: ${index * 50}ms" onclick="openModal(${p.id})">
                <div class="img-aspect p-8 flex items-center justify-center">
                    <img src="${p.img}" loading="lazy" class="w-full h-full object-contain blend-img">
                </div>
                <div class="p-5">
                    <p class="text-[7px] text-brand-primary font-extrabold uppercase tracking-widest">${p.cat}</p>
                    <h3 class="font-bold text-xs truncate dark:text-gray-100">${p.name}</h3>
                </div>
            </div>`;
        }).join('');
    }

    function openModal(id) {
        const p = productCatalog.find(x => x.id === parseInt(id));
        if (!p) return;
        activeProductId = p.id;
        document.getElementById('modal-img').src = p.img;
        document.getElementById('modal-title').innerText = p.name;
        document.getElementById('modal-cat').innerText = p.cat;
        document.getElementById('modal-desc').innerText = p.desc;
        document.getElementById('modal-buy-btn').href = `https://www.amazon.com/dp/${p.asin}?tag=${AFFILIATE_ID}`;
        document.getElementById('modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';

        // ── FIX: Push state so browser 'Back' closes the modal ──
        if (window.location.hash !== `#product-${id}`) {
            window.history.pushState({ productId: id }, '', `#product-${id}`);
        }
    }

    function closeModal(skipHistory = false) {
        document.getElementById('modal').classList.add('hidden');
        document.body.style.overflow = 'auto';
        activeProductId = null;

        // If closing manually, reset the URL hash
        if (!skipHistory && window.location.hash.includes('product-')) {
            window.history.pushState({ page: 'home' }, '', window.location.pathname);
        }
    }

    async function copyProductImage(event) {
        const btn = event.currentTarget;
        const oldIcon = btn.innerHTML;
        const p = productCatalog.find(x => x.id === activeProductId);
        if (!p) return;

        try {
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            const response = await fetch(p.img);
            const blob = await response.blob();
            if (navigator.clipboard && window.ClipboardItem) {
                const data = [new ClipboardItem({ [blob.type]: blob })];
                await navigator.clipboard.write(data);
                showToast('Image Copied! Paste in Chat');
            }
        } catch (err) {
            showToast('Failed to copy image');
        } finally {
            btn.innerHTML = oldIcon;
        }
    }

    async function shareProduct(event) {
        const btn = event.currentTarget;
        const old = btn.innerHTML;
        const p = productCatalog.find(x => x.id === activeProductId);
        const productURL = buildProductURL(activeProductId);
        const shareText = `🔥 Check out the ${p.name} on Nexora!\n\n${p.desc}\n\n`;

        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
        try {
            if (navigator.share) {
                await navigator.share({ title: p.name, text: shareText, url: productURL });
            } else {
                await navigator.clipboard.writeText(`${shareText}${productURL}`);
                showToast('Link Copied!');
            }
        } catch (e) {}
        btn.innerHTML = old;
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2000);
    }

    function handleOutsideClick(e) { if (e.target.id === 'modal') closeModal(); }
    function toggleTheme() { document.documentElement.classList.toggle('dark'); }

    // ── FIX: Back button handling ──
    window.addEventListener('popstate', (event) => {
        if (event.state && event.state.productId) {
            openModal(event.state.productId);
        } else {
            closeModal(true);
        }
    });

    window.addEventListener('DOMContentLoaded', initializeVault);
    </script>
</body>
</html>
